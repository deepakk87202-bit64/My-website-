<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deepak Rail World</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
  transition: 0.3s;
}

body.light {
  background: #ffffff;
  color: black;
}

.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

.hero h1 span {
  color: #00f7ff;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

.search-box {
  margin: 20px;
  text-align: center;
}

.search-box input {
  padding: 10px;
  width: 250px;
  border-radius: 20px;
  border: none;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  width: 280px;
  cursor: pointer;
  transition: 0.3s;
}

.card.active {
  border: 3px solid #00f7ff;
  box-shadow: 0 0 15px #00f7ff;
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
}

.details {
  display: none;
  padding: 30px;
}

.details.active {
  display: block;
}

#wap4 { background: #3b0a0a; }
#wap5 { background: #ffffff; color: black; }
#wap7 { background: linear-gradient(135deg,#ffffff,#0ea5e9); color: black; }
#wdp4d { background: linear-gradient(135deg,#000000,#1e293b,#0ea5e9); }

.slider {
  position: relative;
  text-align: center;
}

.slider img {
  width: 250px;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
}

.slider button {
  position: absolute;
  top: 40%;
  background: rgba(0,0,0,0.5);
  color: white;
}

.prev { left: 0; }
.next { right: 0; }

@media(max-width: 600px) {
  .card { width: 90%; }
}
</style>
</head>

<body>

<section class="hero">
  <h1>Hello, I'm <span>Deepak</span></h1>
  <p>Railway Info Website 🚆</p>
  <button onclick="toggleMode()">🌙 Toggle Mode</button>
</section>

<div class="search-box">
  <input type="text" placeholder="Search Locomotive..." onkeyup="searchLoco(this.value)">
</div>

<div class="cards">

  <div class="card" onclick="showDetails('wap4', this)">
    <img src="images/wap4-1.jpeg">
    <h3>WAP-4</h3>
  </div>

  <div class="card" onclick="showDetails('wap5', this)">
    <img src="images/wap5-1.jpeg">
    <h3>WAP-5</h3>
  </div>

  <div class="card" onclick="showDetails('wap7', this)">
    <img src="images/wap7-1.jpeg">
    <h3>WAP-7</h3>
  </div>

  <div class="card" onclick="showDetails('wdp4d', this)">
    <img src="images/wdp4d-1.jpeg">
    <h3>WDP-4D</h3>
  </div>

</div>

<div id="wap4" class="details">
  <h2>WAP-4</h2>
  <div class="slider">
    <button class="prev" onclick="changeSlide(-1,'wap4')">❮</button>
    <img id="wap4-img" src="images/wap4-1.jpeg">
    <button class="next" onclick="changeSlide(1,'wap4')">❯</button>
  </div>
</div>

<div id="wap5" class="details">
  <h2>WAP-5</h2>
  <div class="slider">
    <button class="prev" onclick="changeSlide(-1,'wap5')">❮</button>
    <img id="wap5-img" src="images/wap5-1.jpeg">
    <button class="next" onclick="changeSlide(1,'wap5')">❯</button>
  </div>
</div>

<div id="wap7" class="details">
  <h2>WAP-7</h2>
  <div class="slider">
    <button class="prev" onclick="changeSlide(-1,'wap7')">❮</button>
    <img id="wap7-img" src="images/wap7-1.jpeg">
    <button class="next" onclick="changeSlide(1,'wap7')">❯</button>
  </div>
</div>

<div id="wdp4d" class="details">
  <h2>WDP-4D</h2>
  <div class="slider">
    <button class="prev" onclick="changeSlide(-1,'wdp4d')">❮</button>
    <img id="wdp4d-img" src="images/wdp4d-1.jpeg">
    <button class="next" onclick="changeSlide(1,'wdp4d')">❯</button>
  </div>
</div>

<script>
function toggleMode() {
  document.body.classList.toggle("light");
}

function searchLoco(val) {
  let cards = document.querySelectorAll(".card");
  cards.forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(val.toLowerCase()) ? "block" : "none";
  });
}

function showDetails(id, el) {
  document.querySelectorAll('.details').forEach(d => d.classList.remove('active'));
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));

  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

let images = {
  wap4: ["images/wap4-1.jpeg","images/wap4-2.jpeg","images/wap4-3.jpeg"],
  wap5: ["images/wap5-1.jpeg","images/wap5-2.jpeg","images/wap5-3.jpeg"],
  wap7: ["images/wap7-1.jpeg","images/wap7-2.jpeg","images/wap7-3.jpeg"],
  wdp4d: ["images/wdp4d-1.jpeg","images/wdp4d-2.jpeg","images/wdp4d-3.jpeg"]
};

let index = { wap4:0, wap5:0, wap7:0, wdp4d:0 };

function changeSlide(dir, loco) {
  index[loco] += dir;

  if(index[loco] < 0) index[loco] = images[loco].length - 1;
  if(index[loco] >= images[loco].length) index[loco] = 0;

  document.getElementById(loco+"-img").src = images[loco][index[loco]];
}
</script>

</body>
</html>
